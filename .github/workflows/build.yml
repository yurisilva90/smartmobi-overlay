name: Build SmartMobi APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses 2>/dev/null || true
          $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK "platforms;android-34" "build-tools;34.0.0" 2>/dev/null
          echo "sdk.dir=$SDK" > local.properties

      - run: chmod +x gradlew

      - name: Build APK and save log
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log; exit ${PIPESTATUS[0]}
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SmartMobi-v1.3.0
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 60

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: gradle-error-log
          path: /tmp/gradle.log
          retention-days: 7
