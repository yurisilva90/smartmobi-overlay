name: Build SmartMobi APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses 2>/dev/null || true
          $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK "platforms;android-34" "build-tools;34.0.0" 2>/dev/null
          echo "sdk.dir=$SDK" > local.properties

      - run: chmod +x gradlew

      - name: Show Gradle error in annotation
        run: |
          ./gradlew assembleDebug --no-daemon > /tmp/out.txt 2>&1 || true
          ERRORS=$(grep -E "(error:|Error |FAILED|Exception|unresolved|cannot find)" /tmp/out.txt | head -10)
          LAST=$(tail -30 /tmp/out.txt)
          echo "::error::ERRORS: $ERRORS"
          echo "::warning::LAST30: $LAST"
          cat /tmp/out.txt | tail -80
          exit 1
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SmartMobi-v1.3.0
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 60
