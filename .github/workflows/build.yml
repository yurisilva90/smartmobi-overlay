name: Build SmartMobi Overlay APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | grep -v suffix | sed "s/.*versionName \"//;s/\".*//")
          echo "name=SmartMobi-Overlay-v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with version
        run: |
          VERSION=$(grep versionName app/build.gradle | grep -v suffix | sed "s/.*versionName \"//;s/\".*//")
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/SmartMobi-Overlay-v${VERSION}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/debug/SmartMobi-Overlay-v*.apk
          retention-days: 60
