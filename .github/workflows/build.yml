name: Build SmartMobi APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          mkdir -p $HOME/android/cmdline-tools
          unzip -q cmdtools.zip -d $HOME/android/cmdline-tools
          mv $HOME/android/cmdline-tools/cmdline-tools $HOME/android/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          yes | $HOME/android/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>/dev/null
      - run: chmod +x gradlew
      - name: Build APK
        id: build
        run: |
          ./gradlew assembleDebug --no-daemon --no-build-cache --stacktrace 2>&1 | tee /tmp/build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        continue-on-error: true
      - name: Show last errors
        if: always()
        run: |
          echo "=== LAST 150 LINES ==="
          tail -150 /tmp/build.log
          echo "=== ERRORS ==="
          grep -E "(error:|Error|FAILED|Exception|cannot find)" /tmp/build.log | head -30 || true
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 3
      - name: Upload APK if success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SmartMobi-v1.3.0
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 60
      - name: Fail if build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
