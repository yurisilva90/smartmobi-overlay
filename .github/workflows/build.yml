name: Build MoB APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses 2>/dev/null || true
          $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK "platforms;android-34" "build-tools;34.0.0" 2>/dev/null
          echo "sdk.dir=$SDK" > local.properties
      - name: Restore debug keystore fixo
        run: |
          mkdir -p ~/.android
          echo "" | base64 -d > ~/.android/debug.keystore
          echo "Debug keystore restaurado"
      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s+"\K[^"]+' app/build.gradle)
          CODE=$(grep -oP 'versionCode\s+\K\d+' app/build.gradle)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          # Renomear o run para ficar igual ao artifact name
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "{\"display_title\":\"MoB-v${VERSION}-c${CODE}\"}"
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      - uses: actions/upload-artifact@v4
        with:
          name: MoB-v${{ steps.version.outputs.version }}-c${{ steps.version.outputs.code }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 60
