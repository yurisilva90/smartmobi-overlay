name: Build SmartMobi APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses 2>/dev/null || true
          $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK "platforms;android-34" "build-tools;34.0.0" 2>/dev/null
          echo "sdk.dir=$SDK" > local.properties
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      - uses: actions/upload-artifact@v4
        with:
          name: SmartMobi-v1.4.3
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 60
